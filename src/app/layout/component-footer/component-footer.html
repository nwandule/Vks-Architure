<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <h3>{{ footer.brand }}</h3>
        <p>{{ footer.tagline }}</p>
      </div>
      
      <div class="footer-contact">
        <h4>Connect</h4>
        <p>{{ footer.email }}</p>
        <p>{{ footer.phone }}</p>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; {{ currentYear }} All Rights Reserved.</p>
      <div class="socials">IG / LI / TW</div>
    </div>
  </div>
</footer>
